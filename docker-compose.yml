services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recruitment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruitment}
      POSTGRES_DB: ${POSTGRES_DB:-recruitment}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://recruitment:recruitment@postgres:5432/recruitment}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      LM_STUDIO_BASE_URL: ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      RECRUITING_LLM_MODEL: ${RECRUITING_LLM_MODEL:-qwen/qwen3-4b-2507}
      RECRUITING_ALLOW_THINKING_MODEL_FOR_JSON: ${RECRUITING_ALLOW_THINKING_MODEL_FOR_JSON:-false}
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      LM_STUDIO_TEMPERATURE: ${LM_STUDIO_TEMPERATURE:-0.2}
      LM_STUDIO_TIMEOUT_SECONDS: ${LM_STUDIO_TIMEOUT_SECONDS:-180}
      LM_STUDIO_MAX_TOKENS: ${LM_STUDIO_MAX_TOKENS:-2048}
      LM_STUDIO_ENABLE_THINKING: ${LM_STUDIO_ENABLE_THINKING:-false}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      EMAIL_FROM: ${EMAIL_FROM:-recruiting@example.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-dev-only-32-bytes-minimum}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:-}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-}
      DEV_RECRUITER_EMAIL: ${DEV_RECRUITER_EMAIL:-}
      DEV_RECRUITER_PASSWORD: ${DEV_RECRUITER_PASSWORD:-}
      DEV_MANAGER_EMAIL: ${DEV_MANAGER_EMAIL:-}
      DEV_MANAGER_PASSWORD: ${DEV_MANAGER_PASSWORD:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://recruitment:recruitment@postgres:5432/recruitment}
      LM_STUDIO_BASE_URL: ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      RECRUITING_LLM_MODEL: ${RECRUITING_LLM_MODEL:-qwen/qwen3-4b-2507}
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-dev-only-32-bytes-minimum}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uv", "run", "alembic", "upgrade", "head"]

volumes:
  postgres_data:
